# Packaging Two Tier Application
helm create my-sql

# Add Env Vars 
spec:
  containers:
  - name: mysql
    image: mysql:8.0
    ports:
    - containerPort: 3306
    env:
    - name: MY_SQL_ROOT_PASSWORD
      value: root
    - name: MYSQL_DATABASE
      value: devops
    - name: MYSQL_USER
      value: admin
    - name: MYSQL_PASSWORD
      value: admin
    volumeMounts:
      - name: mysql-data
        mountPath: /var/lib/mysql

# Inside Values
env:
  MY_SQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: devops
  MYSQL_USER: admin
  MYSQL_PASSWORD: admin

# Modify Port, targetPort and image 

################# Package Flask Application

# Dockerfile
FROM python:3.10 AS builder

# Create an app directory
WORKDIR /app

COPY requirements.txt .
# Install Dependencies
RUN pip install --no-cache-dir -r requirements.txt 

COPY app.py app.py

# Stage 2: Production
FROM python:3.10-slim
WORKDIR /app

# Copying the required dependencies
COPY --from=builder /usr/local /usr/local
COPY --from=builder /app /app

# Create a non root user
RUN useradd -m appuser
USER appuser

# Run the application
CMD ["python", "app.py"]


