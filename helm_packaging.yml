# Packaging Two Tier Application
helm create my-sql

# Add Env Vars 
spec:
  containers:
  - name: mysql
    image: mysql:8.0
    ports:
    - containerPort: 3306
    env:
    - name: MY_SQL_ROOT_PASSWORD
      value: root
    - name: MYSQL_DATABASE
      value: devops
    - name: MYSQL_USER
      value: admin
    - name: MYSQL_PASSWORD
      value: admin
    volumeMounts:
      - name: mysql-data
        mountPath: /var/lib/mysql

# Inside Values
env:
  MY_SQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: devops
  MYSQL_USER: admin
  MYSQL_PASSWORD: admin

